name = "test-menu"
main = "index.js"
compatibility_date = "2024-03-01"

# ربط قاعدة البيانات D1
[[d1_databases]]
binding = "DB"          # يجب أن يطابق الاسم المستخدم في الكود (env.DB)
database_name = "menu_db"   # اسم قاعدة البيانات من حسابك
database_id = "معرف قاعدة البيانات"  # يمكنك الحصول عليه من لوحة D1

# ربط R2 (لرفع الصور)
[[r2_buckets]]
binding = "R2"          # يجب أن يطابق الاسم المستخدم في الكود (env.R2)
bucket_name = "menu-images"  # اسم الحاوية (bucket) من حسابك

# إذا كان لديك متغيرات بيئة، ضعها هنا
[env]
MASTER_PASSWORD = "admin123"  # أو استخدم متغيرات البيئة الحقيقية